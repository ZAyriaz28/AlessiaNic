<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <meta name="theme-color" content="#fef5e7">
    <title>Iniciar Sesión - Alessia Nic</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="script.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 p-0">

    <header class="app-header text-center pb-2 pt-4 px-3">
        <div class="d-flex align-items-center justify-content-center flex-column">
            <div class="logo-circle shadow-sm mb-2">
                <i class="bi bi-bag-heart-fill fs-1 text-white"></i>
            </div>
            <h1 class="fw-bold fs-4 text-dark mb-0 tracking-tight cursive-brand">Alessia Nic</h1>
            <p class="text-muted small fw-semibold">Gestión de Pedidos Shein</p>
        </div>
    </header>

    <main class="container flex-grow-1 px-3 px-md-4 d-flex align-items-center justify-content-center">
        <section class="card app-card shadow-sm mb-4 border-0" style="max-width: 420px; width: 100%;">
            <div class="card-body p-4">
                <h2 class="h5 fw-bold text-primary mb-4 text-center">
                    <i class="bi bi-shield-lock-fill me-2"></i> Iniciar Sesión
                </h2>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginUsuario" class="form-label text-secondary fw-bold small mb-1">Usuario</label>
                        <div class="input-group app-input-group">
                            <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" id="loginUsuario" required class="form-control form-control-lg" autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="loginPassword" class="form-label text-secondary fw-bold small mb-1">Contraseña</label>
                        <div class="input-group app-input-group">
                            <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" id="loginPassword" required class="form-control form-control-lg" autocomplete="current-password">
                        </div>
                    </div>

                    <div id="loginError" class="text-danger small text-center mb-3" style="display:none;"></div>

                    <button type="submit" class="btn btn-app-primary w-100 btn-lg shadow rounded-pill fw-bold py-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
