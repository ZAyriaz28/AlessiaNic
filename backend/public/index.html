<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
    <meta name="theme-color" content="#FCF8F5"> 
    <title>Tienda Privada SHEIN - Alessia Nic</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,600&family=Manrope:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="script.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 p-0">
    
    <div id="loader-wrapper">
        <div class="loader-content">
            <div class="logo-circle loading-logo mb-3">
                <i class="bi bi-bag-heart-fill text-white fs-1"></i>
            </div>
            <h1 class="cursive-brand text-dark">Alessia Nic</h1>
            <div class="spinner-border text-primary-dark mt-3" role="status"></div>
        </div>
    </div>

    <header class="app-header text-center pb-2 pt-4 px-3">
        <div class="d-flex align-items-center justify-content-center flex-column">
            <div class="logo-circle shadow-sm mb-2">
                <i class="bi bi-bag-heart-fill fs-1 text-white"></i>
            </div>
            <h1 class="fw-bold fs-4 text-dark mb-0 tracking-tight cursive-brand">Alessia Nic</h1>
            <p class="text-muted small fw-semibold">Gestión de Pedidos Shein</p>
        </div>
    </header>

    <div class="container mt-2 mb-3 d-flex flex-wrap align-items-center justify-content-between gap-2">
        <div class="small text-muted fw-semibold">
            <i class="bi bi-person-circle me-1"></i> <span id="usuarioActivo">—</span>
            <a href="#" id="logoutBtn" class="ms-2 text-decoration-none text-danger fw-bold">
                <i class="bi bi-box-arrow-right"></i> Salir
            </a>
        </div>
        <a href="admin.html" class="btn btn-app-primary rounded-pill px-4 shadow-sm">
            <i class="bi bi-shield-lock-fill me-2"></i> Administrar Pedidos
        </a>
    </div>

    <main class="container flex-grow-1 px-3 px-md-4">
        <section class="card app-card shadow-sm mb-4 border-0">
            <div class="card-body p-4">
                <h2 class="h5 fw-bold text-primary mb-4 d-flex align-items-center">
                    <div class="icon-box me-3"><i class="bi bi-box-seam"></i></div>
                    Nuevo Pedido / Cargamento
                </h2>

                <form id="pedidoForm">
                    <div class="row g-3 mb-3">
                        <div class="col-12 col-md-5">
                            <label for="proveedor" class="form-label text-secondary fw-bold small mb-1">Proveedor</label>
                            <div class="input-group app-input-group">
                                <span class="input-group-text"><i class="bi bi-shop text-muted"></i></span>
                                <input type="text" id="proveedor" required value="Shein" class="form-control form-control-lg">
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <label for="fechaPedido" class="form-label text-secondary fw-bold small mb-1">Fecha</label>
                            <input type="date" id="fechaPedido" required class="form-control form-control-lg">
                        </div>
                        <div class="col-6 col-md-3">
                            <label for="costoEnvio" class="form-label text-secondary fw-bold small mb-1">Envío (C$)</label>
                            <div class="input-group app-input-group">
                                <span class="input-group-text">C$</span>
                                <input type="number" id="costoEnvio" step="0.01" min="0" value="0" class="form-control form-control-lg">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="observaciones" class="form-label text-secondary fw-bold small mb-1">Observaciones (opcional)</label>
                        <textarea id="observaciones" class="form-control" rows="2" placeholder="Ej. Llegó con retraso, un producto dañado, etc."></textarea>
                    </div>

                    <hr class="my-4">

                    <h3 class="h6 fw-bold text-dark mb-3 d-flex align-items-center justify-content-between">
                        <span><i class="bi bi-boxes me-2 text-primary"></i>Productos del Pedido</span>
                        <button type="button" id="agregarProductoBtn" class="btn btn-sm btn-outline-primary rounded-pill">
                            <i class="bi bi-plus-lg"></i> Agregar producto
                        </button>
                    </h3>

                    <div id="productosContainer"></div>

                    <div class="highlight-box rounded-4 p-3 my-4 text-center">
                        <span class="fw-bold text-primary">Total del Pedido: </span>
                        <span id="totalPedido" class="fw-bold fs-5 text-dark">C$ 0.00</span>
                    </div>

                    <button type="submit" class="btn btn-app-primary w-100 btn-lg shadow rounded-pill fw-bold d-flex align-items-center justify-content-center py-3">
                        <i class="bi bi-floppy-fill me-2 fs-5"></i> GUARDAR PEDIDO
                    </button>
                </form>
            </div>
        </section>
    </main>

    <template id="productoRowTemplate">
        <div class="producto-row card border-0 bg-light rounded-4 p-3 mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-md-4">
                    <label class="form-label small text-secondary fw-bold mb-1">Producto</label>
                    <input type="text" class="form-control prod-nombre" placeholder="Ej. Camisa Negra" required>
                </div>
                <div class="col-4 col-md-2">
                    <label class="form-label small text-secondary fw-bold mb-1">Cantidad</label>
                    <input type="number" class="form-control prod-cantidad" min="1" value="1" required>
                </div>
                <div class="col-4 col-md-2">
                    <label class="form-label small text-secondary fw-bold mb-1">Costo Unit. (C$)</label>
                    <input type="number" class="form-control prod-costo" step="0.01" min="0" required>
                </div>
                <div class="col-4 col-md-2">
                    <label class="form-label small text-secondary fw-bold mb-1">Precio Venta (C$)</label>
                    <input type="number" class="form-control prod-precio" step="0.01" min="0" required>
                </div>
                <div class="col-10 col-md-1">
                    <label class="form-label small text-secondary fw-bold mb-1 d-none d-md-block">&nbsp;</label>
                    <div class="form-control-plaintext fw-bold text-center prod-subtotal">C$ 0.00</div>
                </div>
                <div class="col-2 col-md-1 text-end">
                    <button type="button" class="btn btn-sm btn-outline-danger rounded-circle eliminar-producto-btn"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        </div>
    </template>

    <nav class="mobile-bottom-bar shadow-lg">
        <div class="d-flex justify-content-around align-items-center h-100">
            <a href="index.html" class="nav-item active text-center text-decoration-none">
                <i class="bi bi-house-door-fill fs-4 d-block mb-1"></i>
                <span class="small fw-bold">Inicio</span>
            </a>
            <a href="admin.html" class="nav-item text-center text-decoration-none text-muted">
                <i class="bi bi-shield-lock fs-4 d-block mb-1"></i>
                <span class="small fw-bold">Admin</span>
            </a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
